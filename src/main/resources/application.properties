# ---------------------------------------------------------
# CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# ---------------------------------------------------------

# Nombre lógico de la aplicación dentro de Spring Boot.
# Este nombre ayuda a identificar el microservicio dentro del proyecto.
#
# Semana 1:
# - Se trabajaba con una aplicación base de hotel.
#
# Semana 2:
# - Comenzamos a tratar este proyecto como un microservicio independiente.
spring.application.name=hotel

# Puerto en el que se ejecutará la aplicación.
#
# Semana 1:
# - Se trabajó normalmente con el puerto 8080.
#
# Semana 2:
# - Se mantiene en 8080 para que el microservicio de cliente use el 8081
#   y puedan convivir de forma independiente.
server.port=8080


# ---------------------------------------------------------
# CONFIGURACIÓN DE CONEXIÓN A ORACLE
# ---------------------------------------------------------

# URL de conexión JDBC a Oracle.
# Formato general:
# jdbc:oracle:thin:@//host:puerto/serviceName
#
# En este caso, se conecta a Oracle ejecutándose localmente.
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1

# Usuario de la base de datos Oracle.
spring.datasource.username=SYSTEM

# Contraseña del usuario Oracle.
spring.datasource.password=SYS2026

# Driver JDBC que usará Spring para conectarse a Oracle.
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ---------------------------------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE
# ---------------------------------------------------------

# Define cómo Hibernate gestionará la estructura de la base de datos.
#
# Opciones comunes:
# - none   -> no realiza cambios en la base de datos
# - update -> crea o ajusta tablas y columnas sin borrar datos
# - create -> crea la estructura desde cero cada vez
# - create-drop -> crea al iniciar y elimina al detener
#
# Semana 1:
# - Se trabajaba con "none" porque la tabla ya existía previamente.
#
# Semana 2:
# - Se cambia a "update" para permitir que Spring Boot y Hibernate
#   actualicen automáticamente la estructura según la entidad Reserva.
# - Esto nos ayuda a trabajar de forma más dinámica mientras
#   mejoramos el proyecto.
spring.jpa.hibernate.ddl-auto=update

# Muestra en consola las sentencias SQL ejecutadas por Hibernate.
# Esto es muy útil para comprender qué consultas realiza la aplicación.
spring.jpa.show-sql=true

# Formatea el SQL mostrado en consola para hacerlo más legible.
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para Oracle.
# Permite que Hibernate genere SQL compatible con Oracle Database.
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect